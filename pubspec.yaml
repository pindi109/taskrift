name: taskrift
description: A to-do list app where users can create tasks, set due dates, mark them complete and organise into projects.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.10
  google_sign_in: ^6.2.1
  provider: ^6.1.1
  intl: ^0.19.0
  uuid: ^4.3.3
  flutter_local_notifications: ^16.3.0
  shared_preferences: ^2.2.2
  lottie: ^3.0.0
  flutter_slidable: ^3.0.1
  table_calendar: ^3.0.9
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
